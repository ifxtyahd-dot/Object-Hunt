<!DOCTYPE html>
<html>
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-zinc-950 text-white p-6">
    <h1 id="status" class="text-xl">Initializing Grid...</h1>
    <div id="game-ui" class="mt-4 p-4 border border-zinc-700 rounded">
        <p id="data-display">Connecting...</p>
    </div>

    <script>
        // --- PASTE YOUR KEYS HERE ---
        const SUPABASE_URL = "https://djwpuzswnbkivckayhwp.supabase.co/rest/v1/"; 
        const SUPABASE_ANON_KEY = "sb_publishable_R32nDh1HNSJWRTm81iVT4A_ywd6bpgT";
        // ----------------------------

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const statusEl = document.getElementById('status');
        const dataEl = document.getElementById('data-display');

        async function connect() {
            try {
                statusEl.textContent = "Fetching Data...";
                let { data, error } = await supabase.from('active_nodes').select('*');
                
                if (error) throw error;
                if (!data || data.length === 0) {
                    dataEl.textContent = "Database is connected but empty.";
                } else {
                    dataEl.textContent = "Data Loaded! Found " + data.length + " nodes.";
                    console.log(data);
                }
            } catch (err) {
                statusEl.textContent = "CONNECTION ERROR";
                dataEl.textContent = err.message;
            }
        }
        connect();
    </script>
</body>
</html>
